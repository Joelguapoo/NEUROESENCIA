{% extends 'usuarios/base.html' %}
{% block content %}

<style>
    /* ==========================================================================
       VARIABLES PREMIUM (SaaS Purple Vibe)
       ========================================================================== */
    :root {
        --purple-brand: #7C3AED;      /* Morado principal vibrante */
        --purple-dark: #2a1f45;       /* Morado oscuro institucional/bóveda */
        --purple-light: #C4B5FD;      /* Morado claro suave */
        --purple-glow: rgba(124, 58, 237, 0.25);
        --success-green: #10B981;     /* Verde para éxito */
        
        --bg-light: #F4F7FE;
        --text-main: #111827;
        --text-muted: #6B7280;
        --card-bg: #FFFFFF;
        --border-color: #E5E7EB;
        
        --shadow-premium: 0 15px 40px rgba(42, 31, 69, 0.08);
        --transition-spring: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        --transition-fast: all 0.2s ease-in-out;
    }

    body { background-color: var(--bg-light); }

    /* --- ANIMACIONES --- */
    .fade-in-up {
        animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(20px);
    }
    @keyframes fadeInUp {
        to { opacity: 1; transform: translateY(0); }
    }

    /* --- TARJETA PRINCIPAL (Bóveda Morada) --- */
    .recovery-card {
        background: var(--card-bg);
        border-radius: 24px;
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-premium);
        transition: transform 0.3s ease;
        position: relative;
        overflow: hidden;
    }
    .recovery-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 50px rgba(42, 31, 69, 0.12);
    }

    /* Marca de agua de fondo (Sobre) */
    .recovery-card::before {
        content: '\f2b6'; /* Icono envelope-open-text de FontAwesome */
        font-family: "Font Awesome 6 Free";
        font-weight: 900;
        position: absolute;
        top: -30px;
        right: -30px;
        font-size: 200px;
        color: rgba(124, 58, 237, 0.03);
        pointer-events: none;
        z-index: 0;
        transform: rotate(-15deg);
    }

    /* Icono Superior */
    .brand-icon-wrapper {
        width: 70px; 
        height: 70px;
        background: rgba(124, 58, 237, 0.1);
        color: var(--purple-brand);
        border-radius: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        transform: rotate(-5deg);
        transition: 0.3s;
        position: relative;
        z-index: 1;
    }
    .recovery-card:hover .brand-icon-wrapper {
        transform: rotate(0deg) scale(1.05);
        background: var(--purple-brand);
        color: white;
    }

    /* --- INPUTS PREMIUM --- */
    .form-label-custom {
        font-weight: 800;
        font-size: 0.75rem;
        color: var(--text-muted);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 8px;
        display: block;
        margin-left: 4px;
        position: relative;
        z-index: 1;
    }

    .input-custom {
        border-radius: 14px !important;
        border: 2px solid var(--border-color) !important;
        background-color: var(--bg-light) !important;
        padding: 14px 15px 14px 50px !important; /* Espacio para el ícono */
        font-weight: 600;
        color: var(--purple-dark) !important;
        transition: var(--transition-fast);
        box-shadow: none !important;
        position: relative;
        z-index: 1;
    }
    .input-custom:focus {
        background-color: #ffffff !important;
        border-color: var(--purple-brand) !important;
        box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1) !important;
        outline: none !important;
    }
    .input-custom::placeholder {
        color: #94A3B8;
        font-weight: 500;
    }

    /* Íconos dentro del Input */
    .custom-icon {
        position: absolute;
        z-index: 10;
        top: 50%;
        transform: translateY(-50%);
        left: 18px;
        color: var(--text-muted);
        transition: 0.3s;
    }
    .input-custom:focus ~ .custom-icon, 
    .input-wrapper:focus-within .custom-icon {
        color: var(--purple-brand);
    }

    /* --- BOTÓN PRINCIPAL --- */
    .btn-main {
        background: var(--purple-brand);
        color: white;
        border-radius: 14px;
        padding: 16px;
        font-weight: 800;
        letter-spacing: 0.5px;
        border: none;
        transition: var(--transition-spring);
        box-shadow: 0 10px 25px var(--purple-glow);
        position: relative;
        z-index: 1;
    }
    .btn-main:hover {
        background: var(--purple-dark);
        color: white;
        transform: translateY(-3px);
        box-shadow: 0 15px 35px rgba(42, 31, 69, 0.3);
    }

    /* --- ALERTAS --- */
    .alert-premium {
        border-radius: 14px;
        border: none;
        font-size: 0.85rem;
        font-weight: 700;
        position: relative;
        z-index: 1;
    }
    .alert-premium.danger {
        background: #fef2f2;
        color: #ef4444;
        border-left: 4px solid #ef4444;
    }
    .alert-premium.success {
        background: #F0FDF4;
        color: #065F46;
        border-left: 4px solid var(--success-green);
    }

    /* --- BOTÓN VOLVER --- */
    .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text-muted);
        font-weight: 700;
        font-size: 0.85rem;
        text-decoration: none;
        transition: color 0.3s ease, transform 0.3s ease;
        margin-bottom: 20px;
    }
    .btn-back:hover {
        color: var(--purple-brand);
        transform: translateX(-3px);
    }

</style>

<div class="container d-flex flex-column justify-content-center align-items-center position-relative" style="min-height: 100vh;">
    
    <div class="w-100" style="max-width: 450px;">
        <a href="{% url 'iniciar_sesion' %}" class="btn-back fade-in-up">
            <i class="fa-solid fa-arrow-left"></i> Volver al Acceso Seguro
        </a>

        <div class="card recovery-card p-4 p-md-5 fade-in-up w-100">

            <div class="text-center mb-4 position-relative z-1">
                <div class="brand-icon-wrapper">
                    <i class="fa-solid fa-envelope-open-text fa-2x"></i>
                </div>
                <h3 class="fw-bold mb-1" style="color: var(--purple-dark); letter-spacing: -0.5px;">Recuperar Acceso</h3>
                <p class="m-0" style="color: var(--text-muted); font-weight: 600;">Dinos tu correo y verificaremos si estás en nuestra base de datos.</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-premium {% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show mb-4" role="alert">
                        <i class="fa-solid {% if message.tags == 'error' %}fa-circle-exclamation{% else %}fa-circle-check{% endif %} me-2"></i>{{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="font-size: 0.7rem;"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" id="recoveryForm" class="position-relative z-1" novalidate>
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label-custom">CORREO ELECTRÓNICO REGISTRADO</label>
                    <div class="position-relative input-wrapper">
                        <span class="custom-icon"><i class="fa-regular fa-envelope"></i></span>
                        <input type="email" name="email" class="form-control input-custom" placeholder="ejemplo@correo.com" required autocomplete="email">
                    </div>
                </div>
                
                <button type="submit" class="btn-main w-100 d-flex justify-content-center align-items-center gap-2" id="btnSubmit">
                    Verificar y Enviar Enlace <i class="fa-solid fa-paper-plane ms-1"></i>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const form = document.getElementById('recoveryForm');
        
        if (form) {
            form.addEventListener('submit', function(e) {
                const inputEmail = document.querySelector('input[name="email"]');
                let isValid = true;
                
                if (inputEmail) {
                    const valor = inputEmail.value.trim();
                    const formatoValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(valor);
                    
                    if (valor === '' || !formatoValido) {
                        inputEmail.style.borderColor = '#EF4444';
                        inputEmail.style.boxShadow = '0 0 0 4px rgba(239, 68, 68, 0.1)';
                        isValid = false;
                    } else {
                        inputEmail.style.borderColor = '';
                        inputEmail.style.boxShadow = '';
                    }
                }
                
                if (!isValid) {
                    e.preventDefault();
                } else {
                    const btn = document.getElementById('btnSubmit');
                    if (btn) {
                        btn.disabled = true;
                        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Procesando...';
                    }
                }
            });

            // Limpiar borde rojo al escribir
            const inputEmail = document.querySelector('input[name="email"]');
            if(inputEmail) {
                inputEmail.addEventListener('input', function() {
                    this.style.borderColor = '';
                    this.style.boxShadow = '';
                });
            }
        }
    });
</script>
{% endblock %}
