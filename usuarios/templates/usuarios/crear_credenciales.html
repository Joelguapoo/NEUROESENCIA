{% extends 'usuarios/base.html' %}

{% block content %}
<style>
    /* --- VARIABLES LOCALES (Sistema Unificado) --- */
    :root {
        --card-bg: #ffffff;
        --page-bg: #f4f7fe;
        --purple-brand: #2a1f45;
        --purple-light: #4c3b73;
        --purple-pastel: #b09ade;
        --text-dark: #2b3674;
        --text-gray: #a3aed1;
        --shadow-soft: 0 15px 40px rgba(42, 31, 69, 0.08);
        --danger-color: #EF4444;
        --warning-color: #F59E0B;
        --success-color: #10B981;
    }

    /* --- ANIMACIONES --- */
    .fade-in-up {
        animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(20px);
    }
    @keyframes fadeInUp {
        to { opacity: 1; transform: translateY(0); }
    }

    /* --- TARJETA DE ACTIVACIÓN --- */
    .activation-card {
        background: var(--card-bg);
        border-radius: 24px;
        border: 1px solid rgba(0,0,0,0.02);
        box-shadow: var(--shadow-soft);
        transition: transform 0.3s ease;
        padding: 40px;
    }
    .activation-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 50px rgba(42, 31, 69, 0.12);
    }

    /* Ícono Superior (Estilo Seguridad) */
    .security-icon-wrapper {
        width: 80px; 
        height: 80px;
        background: rgba(16, 185, 129, 0.1);
        color: var(--success-color);
        border-radius: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 25px;
        transition: 0.3s;
        box-shadow: inset 0 0 0 2px rgba(16, 185, 129, 0.2);
    }
    .activation-card:hover .security-icon-wrapper {
        background: var(--success-color);
        color: white;
        transform: scale(1.05);
        box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
    }

    /* --- INPUTS PREMIUM --- */
    .form-label-custom {
        font-weight: 700;
        font-size: 0.75rem;
        color: var(--text-gray);
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 8px;
        display: block;
        margin-left: 4px;
    }

    .input-custom {
        border-radius: 14px !important;
        border: 2px solid transparent !important;
        background-color: var(--page-bg) !important;
        padding: 14px 15px 14px 50px !important; 
        font-weight: 500;
        color: var(--text-dark) !important;
        transition: all 0.3s ease;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.01) !important;
    }
    .input-custom:focus {
        background-color: #ffffff !important;
        border-color: var(--purple-pastel) !important;
        box-shadow: 0 0 0 4px rgba(176, 154, 222, 0.15) !important;
        outline: none !important;
    }

    /* Íconos dentro del Input */
    .custom-icon {
        position: absolute;
        z-index: 10;
        top: 50%;
        transform: translateY(-50%);
        left: 18px;
        color: var(--text-gray);
        transition: 0.3s;
    }
    .input-wrapper:focus-within .custom-icon {
        color: var(--purple-brand);
    }

    /* Botón de Ojo de Contraseña */
    .password-toggle {
        position: absolute;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
        cursor: pointer;
        color: var(--text-gray);
        transition: color 0.3s ease;
    }
    .password-toggle:hover { color: var(--purple-brand); }

    /* --- MEDIDOR DE SEGURIDAD (SUPER WOW) --- */
    .strength-meter {
        display: flex;
        gap: 6px;
        height: 6px;
        margin-top: 10px;
    }
    .strength-bar {
        flex: 1;
        background-color: #E2E8F0;
        border-radius: 10px;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .strength-text {
        font-size: 0.75rem;
        font-weight: 800;
        text-align: right;
        margin-top: 6px;
        transition: color 0.3s;
    }

    /* Lista de Requisitos */
    .password-requirements {
        list-style: none;
        padding: 0;
        margin: 15px 0 0 0;
        font-size: 0.75rem;
        color: var(--text-gray);
        font-weight: 600;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
    }
    .password-requirements li {
        display: flex;
        align-items: center;
        gap: 6px;
        transition: color 0.3s;
    }
    .password-requirements li i {
        font-size: 0.8rem;
        transition: transform 0.3s, color 0.3s;
    }
    .password-requirements li.valid {
        color: var(--success-color);
    }

    /* --- BOTÓN PRINCIPAL --- */
    .btn-activate {
        background: var(--purple-brand);
        color: white;
        border-radius: 14px;
        padding: 16px;
        font-weight: 700;
        letter-spacing: 0.5px;
        border: none;
        transition: all 0.3s ease;
        box-shadow: 0 8px 20px rgba(42, 31, 69, 0.2);
        font-size: 1.05rem;
    }
    .btn-activate:hover {
        background: var(--purple-light);
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 12px 25px rgba(42, 31, 69, 0.3);
    }
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh; padding: 40px 0;">
    <div class="activation-card fade-in-up" style="max-width: 520px; width: 100%;">
        
        <div class="text-center mb-4">
            <div class="security-icon-wrapper">
                <i class="fa-solid fa-shield-check fa-2x"></i>
            </div>
            <h3 class="fw-bold mb-2" style="color: var(--text-dark); letter-spacing: -0.5px;">Activa tu cuenta</h3>
            <p class="m-0" style="color: var(--text-gray); font-weight: 500; font-size: 0.95rem;">
                Hola <span style="color: var(--purple-brand); font-weight: 700;">{{ paciente.nombre_completo }}</span>, define tus credenciales de acceso seguro.
            </p>
        </div>
        
        <form method="POST" id="activationForm">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="form-label-custom">Nombre de Usuario</label>
                <div class="position-relative input-wrapper">
                    <span class="custom-icon"><i class="fa-regular fa-id-badge"></i></span>
                    <input type="text" name="usuario" class="form-control input-custom" placeholder="Ej: juan_perez" required autocomplete="off">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label-custom">Contraseña Segura</label>
                <div class="position-relative input-wrapper">
                    <span class="custom-icon"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="password" id="passwordInput" class="form-control input-custom" style="padding-right: 50px !important;" placeholder="••••••••" required autocomplete="new-password">
                    <span class="password-toggle" onclick="toggleVisibility('passwordInput', this)"><i class="fa-regular fa-eye"></i></span>
                </div>
                
                <div class="strength-meter">
                    <div class="strength-bar" id="bar-1"></div>
                    <div class="strength-bar" id="bar-2"></div>
                    <div class="strength-bar" id="bar-3"></div>
                </div>
                <div class="strength-text" id="strengthText" style="color: var(--text-gray);">Nivel de Seguridad: Nula</div>

                <ul class="password-requirements">
                    <li id="req-length"><i class="fa-solid fa-circle-xmark"></i> Mínimo 8 caracteres</li>
                    <li id="req-upper"><i class="fa-solid fa-circle-xmark"></i> Letra mayúscula</li>
                    <li id="req-number"><i class="fa-solid fa-circle-xmark"></i> Un número</li>
                    <li id="req-symbol"><i class="fa-solid fa-circle-xmark"></i> Símbolo (Ej: @$!%*)</li>
                </ul>
            </div>

            <div class="mb-5">
                <label class="form-label-custom">Confirmar Contraseña</label>
                <div class="position-relative input-wrapper">
                    <span class="custom-icon"><i class="fa-solid fa-lock-check"></i></span>
                    <input type="password" name="confirm_password" id="confirmPasswordInput" class="form-control input-custom" style="padding-right: 50px !important;" placeholder="••••••••" required>
                    <span class="password-toggle" onclick="toggleVisibility('confirmPasswordInput', this)"><i class="fa-regular fa-eye"></i></span>
                </div>
                <small class="d-block mt-2" id="matchMessage" style="display: none; font-weight: 700;"></small>
            </div>
            
            <button type="submit" class="btn btn-activate w-100 d-flex justify-content-center align-items-center gap-2">
                Activar mi cuenta <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
        
    </div>
</div>

<script>
    // 1. Función para mostrar/ocultar contraseña (Reutilizable para ambos campos)
    function toggleVisibility(inputId, iconElement) {
        const input = document.getElementById(inputId);
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
        iconElement.innerHTML = type === 'password' ? '<i class="fa-regular fa-eye"></i>' : '<i class="fa-regular fa-eye-slash"></i>';
    }

    document.addEventListener("DOMContentLoaded", function() {
        const passInput = document.getElementById('passwordInput');
        const confirmInput = document.getElementById('confirmPasswordInput');
        const matchMessage = document.getElementById('matchMessage');
        const form = document.getElementById('activationForm');
        
        // Elementos visuales
        const bars = [document.getElementById('bar-1'), document.getElementById('bar-2'), document.getElementById('bar-3')];
        const strengthText = document.getElementById('strengthText');
        
        // Nodos de requisitos
        const reqs = {
            length: document.getElementById('req-length'),
            upper: document.getElementById('req-upper'),
            number: document.getElementById('req-number'),
            symbol: document.getElementById('req-symbol')
        };

        let isPasswordSecure = false;

        // 2. Analizador de Fuerza de Contraseña
        passInput.addEventListener('input', function() {
            const val = this.value;
            let score = 0;

            // Validaciones Regex
            const rules = {
                length: val.length >= 8,
                upper: /[A-Z]/.test(val),
                number: /[0-9]/.test(val),
                symbol: /[^A-Za-z0-9]/.test(val) // Cualquier cosa que no sea letra o número
            };

            // Actualizar Checkmarks
            for (let rule in rules) {
                const el = reqs[rule];
                const icon = el.querySelector('i');
                if (rules[rule]) {
                    el.classList.add('valid');
                    icon.className = 'fa-solid fa-circle-check';
                    score++;
                } else {
                    el.classList.remove('valid');
                    icon.className = 'fa-solid fa-circle-xmark';
                }
            }

            // Pintar las barras de poder
            bars.forEach(b => b.style.backgroundColor = '#E2E8F0'); // Reset
            
            if (val.length === 0) {
                strengthText.innerText = 'Nivel de Seguridad: Nula';
                strengthText.style.color = 'var(--text-gray)';
                isPasswordSecure = false;
            } else if (score <= 2) {
                bars[0].style.backgroundColor = 'var(--danger-color)';
                strengthText.innerText = 'Seguridad: Baja';
                strengthText.style.color = 'var(--danger-color)';
                isPasswordSecure = false;
            } else if (score === 3) {
                bars[0].style.backgroundColor = 'var(--warning-color)';
                bars[1].style.backgroundColor = 'var(--warning-color)';
                strengthText.innerText = 'Seguridad: Media';
                strengthText.style.color = 'var(--warning-color)';
                isPasswordSecure = false;
            } else if (score === 4) {
                bars[0].style.backgroundColor = 'var(--success-color)';
                bars[1].style.backgroundColor = 'var(--success-color)';
                bars[2].style.backgroundColor = 'var(--success-color)';
                strengthText.innerText = 'Seguridad: Completa';
                strengthText.style.color = 'var(--success-color)';
                isPasswordSecure = true;
            }

            checkPasswordsMatch(); // Re-chequear coincidencia si edita la original
        });

        // 3. Validador de Coincidencia de Contraseñas
        function checkPasswordsMatch() {
            if (confirmInput.value.length === 0) {
                matchMessage.style.display = 'none';
                confirmInput.style.borderColor = 'transparent';
                return false;
            }

            matchMessage.style.display = 'block';
            if (passInput.value === confirmInput.value) {
                matchMessage.innerHTML = '<i class="fa-solid fa-check"></i> Las contraseñas coinciden';
                matchMessage.style.color = 'var(--success-color)';
                confirmInput.style.borderColor = 'var(--success-color)';
                return true;
            } else {
                matchMessage.innerHTML = '<i class="fa-solid fa-xmark"></i> Las contraseñas no coinciden';
                matchMessage.style.color = 'var(--danger-color)';
                confirmInput.style.borderColor = 'var(--danger-color)';
                return false;
            }
        }

        confirmInput.addEventListener('input', checkPasswordsMatch);

        // 4. Interceptor Final (La Alerta JavaScript solicitada)
        form.addEventListener('submit', function(e) {
            if (!isPasswordSecure) {
                e.preventDefault(); // Detiene el envío del formulario
                alert("Crea una contraseña segura que cumpla con todos los requisitos.");
                passInput.focus();
            } else if (passInput.value !== confirmInput.value) {
                e.preventDefault();
                alert("Las contraseñas no coinciden. Por favor, verifica.");
                confirmInput.focus();
            }
        });
    });
</script>
{% endblock %}
