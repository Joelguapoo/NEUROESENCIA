{% extends 'usuarios/base.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh; background: #f4f7fe;">
    <div class="card p-5 shadow-lg border-0 rounded-4" style="max-width: 450px; width: 100%; background: white;">
        <div class="text-center mb-4">
            <div style="background: rgba(42, 31, 69, 0.1); width: 70px; height: 70px; border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; color: #2a1f45;">
                <i class="fa-solid fa-envelope-open-text fa-2x"></i>
            </div>
            <h2 class="fw-bold mt-3">Recuperar Acceso</h2>
            <p class="text-muted">Dinos tu correo y verificaremos si estás en nuestra base de datos.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} border-0 rounded-3 mb-4 fw-bold">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">CORREO ELECTRÓNICO</label>
                <input type="email" name="email" class="form-control" placeholder="ejemplo@correo.com" style="height: 55px; border-radius: 12px; background: #f8faff;" required>
            </div>
            <button type="submit" class="btn w-100 py-3 fw-bold" style="background: #2a1f45; color: white; border-radius: 12px;">
                Verificar y Enviar Enlace <i class="fa-solid fa-paper-plane ms-2"></i>
            </button>
        </form>
    </div>
</div>
{% endblock %}
